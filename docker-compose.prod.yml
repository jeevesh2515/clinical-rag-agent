version: '3.8'

services:
  clinical-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-workflow-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - clinical_data:/app/data
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:////app/data/clinical_prod.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  clinical_data:
    driver: local
